services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-harborview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-harborview_secret}
      POSTGRES_DB: ${POSTGRES_DB:-harborview}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-harborview}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-harborview}:${POSTGRES_PASSWORD:-harborview_secret}@db:5432/${POSTGRES_DB:-harborview}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-harborview}:${POSTGRES_PASSWORD:-harborview_secret}@db:5432/${POSTGRES_DB:-harborview}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-at-least-32-chars!}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-Mtnrdc9RfRcudGJcRVghSgpNuF6ajT9imf6-1cVIq8s=}
      BACKUP_PASSPHRASE: ${BACKUP_PASSPHRASE:-backup-default-passphrase}
      BACKUP_DIR: /data/backups
      UPLOAD_DIR: /data/uploads
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    volumes:
      - uploads:/data/uploads
      - backups:/data/backups
      - ./:/workspace:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:8080"

volumes:
  pgdata:
  uploads:
  backups:
